name: Deploy to Kubernetes

on:
  push:
    branches: [main]
    paths: ['ecolator-chart/values.yaml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Helm upgrade
        run: helm upgrade --install ecolator ./ecolator-chart -n ecolator --create-namespace -f ./ecolator-chart/values.yaml --atomic --cleanup-on-fail