name: Deploy to Kubernetes

on:
  push:
    branches:
      - docker-k8s
    paths:
      - 'ecolator-chart/values.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout docker-k8s branch
        uses: actions/checkout@v4
        with:
          ref: docker-k8s

      - name: Set PowerShell execution policy
        run: Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
        shell: powershell

      - name: Helm upgrade
        run: |
          helm upgrade --install ecolator-chart ./ecolator-chart -n ecolator --create-namespace