name: Build & Push Eco-Impact Image

on:
  push:
    branches:
      - emissions-calculator
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION=v1.0.${GITHUB_RUN_NUMBER}
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ecolator
          file: ./ecolator/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/eco-impact:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/eco-impact:latest

      - name: Lint Helm chart
        run: helm lint ./ecolator-chart/charts/eco-impact

      - name: Render Helm chart
        run: |
          helm template eco-impact ./ecolator-chart/charts/eco-impact \
            --set dockerHubUsername=${{ secrets.DOCKERHUB_USERNAME }} \
            --set ecoImpact.image.tag=${{ steps.version.outputs.VERSION }}

      - name: Checkout docker-k8s branch
        uses: actions/checkout@v4
        with:
          ref: docker-k8s
          path: docker-k8s

      - name: Update Eco Impact Helm values
        run: |
          cd docker-k8s/ecolator-chart

          sed -i "s|tag: .*|tag: v1.0.${GITHUB_RUN_NUMBER}|" values.yaml

      - name: Commit and push Helm update
        run: |
          cd docker-k8s

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add ecolator-chart/values.yaml
          git commit -m "Eco Impact: update image tag to v1.0.${GITHUB_RUN_NUMBER}" || echo "No changes"
          git push