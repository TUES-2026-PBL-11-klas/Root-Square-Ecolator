name: Build & Push Eco-Impact Image

on:
  push:
    branches: [main]
    paths: ['ecolator/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout service repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set version
        id: version
        run: echo "VERSION=v1.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./ecolator
          file: ./ecolator/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/eco-impact:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/eco-impact:latest

      - name: Update Helm Tag
        run: yq -i '.ecoImpact.tag = "v1.0." + env(GITHUB_RUN_NUMBER)' ecolator-chart/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ecolator-chart/values.yaml
          git commit -m "Update eco-impact tag to v1.0.${GITHUB_RUN_NUMBER}"
          git push