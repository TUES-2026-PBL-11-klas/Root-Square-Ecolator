name: Build & Push Eco-Impact Image

on:
  push:
    branches:
      - emissions-calculator
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION=v1.0.${GITHUB_RUN_NUMBER}
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ecolator
          file: ./ecolator/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/eco-impact:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/eco-impact:latest

      - name: Lint Helm chart
        run: helm lint ./emissions-chart

      - name: Render Helm chart
        run: |
          helm template emissions ./emissions-chart \
            --set dockerHubUsername=${{ secrets.DOCKERHUB_USERNAME }} \
            --set ecoImpact.image.tag=${{ steps.version.outputs.VERSION }}