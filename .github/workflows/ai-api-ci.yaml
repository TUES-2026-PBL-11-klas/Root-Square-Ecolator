name: Build & Push AI-API Image

on:
  push:
    branches: [main]
    paths: ['car-fuel-api/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set version
        id: version
        run: |
          [ -f VERSION ] && V=$(cat VERSION) || V=v1.0.${GITHUB_RUN_NUMBER}
          echo "VERSION=$V" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./car-fuel-api
          file: ./car-fuel-api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-api:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-api:latest

      - name: Update Helm Tag
        run: yq -i ".aiApi.tag = \"${{ steps.version.outputs.VERSION }}\"" ecolator-chart/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ecolator-chart/values.yaml
          git commit -m "Update AI API tag to ${{ steps.version.outputs.VERSION }}"
          git push