name: Build & Push AI-API Image

on:
push:
branches:
- AI-car-fuel-consumption
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Set version
    id: version
    run: |
      if [ -f VERSION ]; then
        VERSION=$(cat VERSION)
      else
        VERSION=v1.0.${GITHUB_RUN_NUMBER}
      fi
      echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - name: Build & Push Docker image
    uses: docker/build-push-action@v5
    with:
      context: ./car-fuel-api
      file: ./car-fuel-api/Dockerfile
      push: true
      tags: |
        ${{ secrets.DOCKERHUB_USERNAME }}/ai-api:${{ steps.version.outputs.VERSION }}
        ${{ secrets.DOCKERHUB_USERNAME }}/ai-api:latest

  - name: Checkout docker-k8s branch
    uses: actions/checkout@v4
    with:
      ref: docker-k8s
      path: docker-k8s
      token: ${{ secrets.GITHUB_TOKEN }}

  - name: Install yq
    run: |
      sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
      sudo chmod +x /usr/bin/yq

  - name: Update AI API Helm values
    run: |
      cd docker-k8s/ecolator-chart
      yq -i '.aiApi.image.tag = "${{ steps.version.outputs.VERSION }}"' values.yaml

  - name: Commit and push Helm update
    run: |
      cd docker-k8s

      git config user.name "github-actions"
      git config user.email "github-actions@github.com"

      git add ecolator-chart/values.yaml
      git commit -m "AI API: update image tag to ${{ steps.version.outputs.VERSION }}" || echo "No changes"
      git push
