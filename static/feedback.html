<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecolator - Feedback</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="menu-container">
      <button id="menuButton" class="menu-button">☰</button>
      <div id="dropdownMenu" class="dropdown">
        <a href="index.html">Home</a>
        <a href="info.html">Add Information</a>
      </div>
    </div>

    <h1>Ecolator</h1>

    <div class="account-container">
      <button id="accountButton" class="account-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f2efe6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M4 21v-2a4 4 0 0 1 3-3.87"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </button>

      <div id="accountMenu" class="dropdown">
        <a href="#">Check Information</a>
        <a href="#">Log Out</a>
      </div>
    </div>
  </header>

  <main>
    <section class="result-section">
      <h2>Your Environmental Feedback</h2>

      <p id="feedbackCo2"></p>
      <p id="feedbackEco"></p>
      <p id="feedbackPercentileText"></p>

      <div class="percentile-wrapper">
        <div class="percentile-scale">
          <div id="percentileMarker" class="percentile-marker"></div>
        </div>

        <div class="percentile-labels">
          <span>Less Harmful</span>
          <span>Average</span>
          <span>More Harmful</span>
        </div>
      </div>
    </section>

    <section class="result-section">
      <h2>Recommendations</h2>
      <ul id="feedbackRecommendations"></ul>
    </section>
  </main>

  <footer>
    <p>Ecolator &copy; 2026</p>
  </footer>

  <script src="feedback.js"></script>
  <script src="liquid-buttons.js"></script>
</body>
</html>
