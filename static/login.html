<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecolator — Login / Register</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #3a5f3a 0%, #2b1500 100%);
    margin: 0;
    padding: 0;
    color: #f2efe6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .login-card {
    background: linear-gradient(to bottom, #e8e1cf, #d6cbb2);
    padding: 2rem 2.5rem;
    border-radius: 16px;
    max-width: 400px;
    width: 100%;
    box-shadow:
      0 8px 20px rgba(0,0,0,0.3),
      inset 0 2px 4px rgba(255,255,255,0.2);
    border: 1px solid #b8a98a;
  }

  .login-logo {
    text-align: center;
    margin-bottom: 2rem;
  }

  .login-logo h1 {
    margin: 0;
    font-size: 28px;
    color: #3b5a40;
  }

  .tabs {
    display: flex;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .tab {
    flex: 1;
    background: none;
    border: none;
    padding: 0.7rem 0;
    color: #556b2f;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .tab.active {
    color: #3b5a40;
    border-bottom: 2px solid #3b5a40;
  }

  .form {
    display: none;
  }

  .form.active {
    display: block;
  }

  .form label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: bold;
    color: #3b5a40;
  }

  .form input {
    width: 100%;
    padding: 0.6rem;
    margin-bottom: 1rem;
    border-radius: 6px;
    border: 1px solid #a78c5f;
    background-color: #f5f1e6;
    transition: all 0.2s ease;
  }

  .form input:focus {
    outline: none;
    border-color: #6a8f5b;
    box-shadow: 0 0 5px rgba(106, 143, 91, 0.5);
  }

  .btn-submit {
    width: 100%;
    background: linear-gradient(to bottom, #7aa66b, #5f8f57);
    color: #f2efe6;
    font-weight: bold;
    padding: 0.7rem;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all 0.2s ease;
  }

  .btn-submit:hover {
    background: linear-gradient(to bottom, #6f9c61, #557548);
  }

  .status {
    text-align: center;
    margin-top: 0.8rem;
    font-weight: bold;
  }

  .status.error { color: #c0392b; }
  .status.success { color: #27ae60; }
  .status.info { color: #556b2f; }
</style>
</head>
<body>

<div class="login-card">

  <div class="login-logo">
    <h1>Ecolator</h1>
    <p style="font-size: 12px; color:#556b2f;">Your ECO-Footprint, Right Here</p>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabLogin">Sign In</button>
    <button class="tab" id="tabRegister">Register</button>
  </div>

  <!-- Login Form -->
  <form class="form active" id="loginForm">
    <label for="loginEmail">Email</label>
    <input type="email" id="loginEmail" placeholder="you@example.com" required>
    <label for="loginPassword">Password</label>
    <input type="password" id="loginPassword" placeholder="••••••" required>
    <button href="info.html" type="submit" class="btn-submit" id="loginBtn">Enter</button>
    <div class="status" id="loginStatus"></div>
  </form>

  <!-- Register Form -->
  <form class="form" id="registerForm">
    <label for="regEmail">Email</label>
    <input type="email" id="regEmail" placeholder="you@example.com" required>
    <label for="regPassword">Password</label>
    <input type="password" id="regPassword" placeholder="Min 8 chars, upper, lower, digit" required>
    <label for="regPassword2">Confirm Password</label>
    <input type="password" id="regPassword2" placeholder="Repeat password" required>
    <button href="info.html" type="submit" class="btn-submit" id="registerBtn">Register</button>
    <div class="status" id="registerStatus"></div>
  </form>

</div>

<script>
  const tabLogin = document.getElementById("tabLogin");
  const tabRegister = document.getElementById("tabRegister");
  const loginForm = document.getElementById("loginForm");
  const registerForm = document.getElementById("registerForm");

  tabLogin.addEventListener("click", () => {
    tabLogin.classList.add("active");
    tabRegister.classList.remove("active");
    loginForm.classList.add("active");
    registerForm.classList.remove("active");
  });

  tabRegister.addEventListener("click", () => {
    tabRegister.classList.add("active");
    tabLogin.classList.remove("active");
    registerForm.classList.add("active");
    loginForm.classList.remove("active");
  });
</script>

</body>
</html>
