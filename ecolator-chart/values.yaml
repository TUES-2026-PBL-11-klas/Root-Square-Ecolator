dockerHubUsername: viktorsirakov08
ecoImpact:
  image: eco-impact
  tag: v1.0.67
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 5
    failureThreshold: 3
aiApi:
  image: ai-api
  tag: v1.0.22
  replicas: 2
  port: 8085
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 20
    periodSeconds: 5
    failureThreshold: 3
postgres:
  image: postgres
  tag: "15"
  port: 5432
  secretName: db-secret
  storage: 1Gi
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  livenessProbe:
    exec:
      command:
        - pg_isready
        - -U
        - ecolator
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    exec:
      command:
        - pg_isready
        - -U
        - ecolator
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3
iam:
  image: iam-service
  tag: v1.0.0
  replicas: 1
  port: 8081
grafana:
  grafana.ini:
    server:
      domain: localhost
      root_url: http://localhost:3000
    security:
      cookie_samesite: lax
      cookie_secure: false
