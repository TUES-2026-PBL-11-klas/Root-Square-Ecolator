dockerHubUsername: viktorsirakov08

aiApi:
  image: ai-api
  tag: v1.0.18
  replicas: 2
  port: 8085
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe: 
    initialDelaySeconds: 20
    periodSeconds: 5
    failureThreshold: 3