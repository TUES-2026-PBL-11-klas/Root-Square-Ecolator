apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-api
  namespace: ecolator
spec:
  replicas: {{ .Values.aiApi.replicas }}
  selector:
    matchLabels:
      app: ai-api
  template:
    metadata:
      labels:
        app: ai-api
    spec:
      containers:
        - name: ai-api
          image: {{ .Values.dockerHubUsername }}/{{ .Values.aiApi.image }}:{{ .Values.aiApi.tag }}
          ports:
            - containerPort: {{ .Values.aiApi.port }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
          resources:
            requests:
              cpu: {{ .Values.aiApi.resources.requests.cpu }}
              memory: {{ .Values.aiApi.resources.requests.memory }}
            limits:
              cpu: {{ .Values.aiApi.resources.limits.cpu }}
              memory: {{ .Values.aiApi.resources.limits.memory }}