dockerHubUsername: viktorsirakov08

ecoImpact:
  image: eco-impact
  tag: v1.0.40
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 20
    periodSeconds: 5
    failureThreshold: 3