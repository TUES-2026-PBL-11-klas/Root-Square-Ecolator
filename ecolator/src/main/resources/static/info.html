<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecolator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
  <div class="menu-container">
    <button id="menuButton" class="menu-button">☰</button>
    <div id="dropdownMenu" class="dropdown">
      <a href="index.html">Home</a>
    </div>
  </div>

  <h1>Ecolator</h1>

  <div class="account-container">
    <button id="accountButton" class="account-button">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f2efe6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M4 21v-2a4 4 0 0 1 3-3.87"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </button>

    <div id="accountMenu" class="dropdown">
      <a href="#">Check Information</a>
      <a href="index.html">Log Out</a>
    </div>
  </div>
</header>

  <main>
    <section class="form-section">
      <h2>Enter Your Data</h2>
      <form id="footprintForm">

        <label>
          City Transport (km/month):
          <input type="number" id="cityTransportKm" required>
        </label>

        <label>
          Outside-City Transport (km/month):
          <input type="number" id="outsideCityTransportKm" required>
        </label>

        <label>
          City Car Fuel Use (L/100km):
          <input type="number" id="cityFuelLitersPer100Km" min="0" step="0.1" required>
        </label>

        <label>
          Outside-City Car Fuel Use (L/100km):
          <input type="number" id="outsideCityFuelLitersPer100Km" min="0" step="0.1" required>
        </label>

        <label>
          Car Fuel Type:
          <select id="fuelType">
            <option value="petrol">Petrol</option>
            <option value="diesel">Diesel</option>
            <option value="lpg">LPG</option>
          </select>
        </label>

        <label>
          Diet:
          <select id="diet">
            <option value="omnivore">Omnivore</option>
            <option value="vegetarian">Vegetarian</option>
            <option value="vegan">Vegan</option>
          </select>
        </label>

        <label>
          Electricity (kWh/month):
          <input type="number" id="electricityKwh" required>
        </label>

        <button type="submit">Calculate Footprint</button>
      </form>
    </section>

  </main>

  <footer>
    <p>Ecolator &copy; 2026</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
