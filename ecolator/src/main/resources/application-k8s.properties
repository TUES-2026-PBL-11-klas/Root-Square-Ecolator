spring.datasource.url=jdbc:postgresql://postgres:5432/ecolator
spring.datasource.username=ecolator
spring.datasource.password=ecolator

management.endpoints.web.exposure.include=*
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState

spring.application.name=ecolator-grafana-api

management.otlp.tracing.endpoint=http://alloy:4318/otlp/v1/traces
management.tracing.sampling.probability=1.0

management.otlp.metrics.export.url=http://alloy:4318/otlp/v1/metrics
management.otlp.metrics.export.step=10s

management.opentelemetry.resource-attributes.service.name=ecolator-grafana-api